<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아쿠아서바이벌 고객센터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d98a;
  --gold-dark: #8a6820;
  --navy: #0a1020;
  --navy-mid: #14213a;
  --navy-card: #1a2b48;
  --blue-glow: #5b9df5;
  --blue-accent: #3a6fd8;
  --stone: #d8dde8;
  --stone-dark: #8a90a8;
  --text-body: #cdd3e0;
  --text-strong: #eef0f5;
  --text-muted: #8a90a8;
  --sidebar-w: 220px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', 'Noto Sans', sans-serif;
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-body);
  background-color: var(--navy);
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--navy-mid);
  border-right: 1px solid rgba(201,168,76,0.15);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-header {
  padding: 24px 16px 16px;
  border-bottom: 1px solid rgba(201,168,76,0.15);
}

.sidebar-header h2 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.sidebar-logo {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.05em;
}

/* Language list */
.lang-section {
  flex: 1;
  padding: 12px 0;
}

.lang-section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 16px 4px;
}

.lang-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  font-size: 13.5px;
  color: var(--text-body);
  border-left: 3px solid transparent;
}

.lang-item:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text-strong);
}

.lang-item.active {
  background: rgba(201,168,76,0.08);
  color: var(--gold);
  border-left-color: var(--gold);
  font-weight: 600;
}

.lang-flag {
  font-size: 18px;
  line-height: 1;
}

/* ── MAIN AREA ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Top nav tabs */
.topnav {
  background: var(--navy-mid);
  border-bottom: 1px solid rgba(201,168,76,0.2);
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 50;
}

.nav-tab {
  padding: 18px 24px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.nav-tab:hover {
  color: var(--text-strong);
}

.nav-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  font-weight: 600;
}

/* Content */
.content {
  flex: 1;
  padding: 48px 56px;
  max-width: 860px;
}

.page-section { display: none; }
.page-section.active { display: block; }

.page-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-strong);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.page-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(201,168,76,0.15);
}

/* Card (고객센터) */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 36px;
}

.contact-card {
  background: var(--navy-card);
  border: 1px solid rgba(91,157,245,0.15);
  border-radius: 12px;
  padding: 24px;
  transition: border-color 0.2s;
}

.contact-card:hover {
  border-color: rgba(201,168,76,0.3);
}

.contact-card-icon {
  font-size: 28px;
  margin-bottom: 12px;
}

.contact-card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-strong);
  margin-bottom: 6px;
}

.contact-card-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}

.contact-card a {
  color: var(--gold);
  text-decoration: none;
}

.contact-card a:hover {
  text-decoration: underline;
}

/* FAQ */
.faq-item {
  background: var(--navy-card);
  border: 1px solid rgba(91,157,245,0.1);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}

.faq-q {
  padding: 16px 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-strong);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: color 0.15s;
}

.faq-q:hover { color: var(--gold); }

.faq-arrow {
  font-size: 12px;
  transition: transform 0.2s;
  color: var(--text-muted);
}

.faq-item.open .faq-arrow { transform: rotate(180deg); }

.faq-a {
  display: none;
  padding: 0 20px 16px;
  font-size: 13.5px;
  color: var(--text-muted);
  line-height: 1.7;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.faq-item.open .faq-a { display: block; }

/* Terms / Privacy document */
.doc-section {
  margin-bottom: 32px;
}

.doc-section h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
}

.doc-section p, .doc-section li {
  font-size: 14px;
  color: var(--text-body);
  line-height: 1.9;
  margin-bottom: 8px;
}

.doc-section ul {
  padding-left: 20px;
}

.doc-section li { margin-bottom: 4px; }

.doc-date {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 28px;
  font-style: italic;
}

.refund-ok-title {
  margin-top: 14px;
  font-weight: 700;
  color: #7ddfaa;
  font-size: 14px;
}

.refund-no-title {
  margin-top: 14px;
  font-weight: 700;
  color: #ff8888;
  font-size: 14px;
}

.refund-cs-title {
  margin-top: 14px;
  font-weight: 700;
  color: #f0d98a;
  font-size: 14px;
}

/* ── NOTICE ── */
.notice-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }

.notice-item {
  background: var(--navy-card);
  border: 1px solid rgba(91,157,245,0.12);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}

.notice-item:hover { border-color: rgba(201,168,76,0.35); }

.notice-item.open { border-color: rgba(201,168,76,0.4); }

.notice-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
}

.notice-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge-update { background: rgba(58,111,216,0.25); color: #7eb5ff; border: 1px solid rgba(58,111,216,0.4); }
.badge-event  { background: rgba(201,168,76,0.2);  color: var(--gold-light); border: 1px solid rgba(201,168,76,0.4); }
.badge-patch  { background: rgba(39,174,96,0.2);   color: #7ddfaa; border: 1px solid rgba(39,174,96,0.4); }
.badge-notice { background: rgba(160,100,220,0.2); color: #c9a0f5; border: 1px solid rgba(160,100,220,0.4); }
.badge-launch { background: rgba(255,140,0,0.2); color: #ffc86a; border: 1px solid rgba(255,140,0,0.5); }
.badge-maintenance { background: rgba(220,80,80,0.2); color: #ff9a9a; border: 1px solid rgba(220,80,80,0.45); }
.badge-policy { background: rgba(190,60,60,0.22); color: #ffb3b3; border: 1px solid rgba(190,60,60,0.5); }

.notice-meta { flex: 1; }

.notice-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-strong);
  margin-bottom: 2px;
}

.notice-date {
  font-size: 11.5px;
  color: var(--text-muted);
}

.notice-arrow {
  font-size: 11px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.notice-item.open .notice-arrow { transform: rotate(180deg); }

.notice-body {
  display: none;
  padding: 0 20px 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.notice-item.open .notice-body { display: block; }

.notice-body p {
  font-size: 13.5px;
  color: var(--text-body);
  line-height: 1.85;
  margin-top: 14px;
  margin-bottom: 8px;
}

.notice-body ul {
  padding-left: 20px;
  margin-bottom: 10px;
}

.notice-body li {
  font-size: 13.5px;
  color: var(--text-body);
  line-height: 1.8;
  margin-bottom: 4px;
}

.notice-body strong { color: var(--gold-light); font-weight: 600; }

.notice-img-placeholder {
  width: 100%;
  height: 160px;
  background: linear-gradient(135deg, rgba(58,111,216,0.15), rgba(201,168,76,0.1));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 12px 0;
  border: 1px dashed rgba(201,168,76,0.2);
}

/* ── COMMUNITY ── */
.community-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 8px;
}

.community-card {
  background: var(--navy-card);
  border: 1px solid rgba(91,157,245,0.15);
  border-radius: 14px;
  padding: 32px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  text-decoration: none;
  color: inherit;
  transition: transform 0.18s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

.community-card:hover {
  transform: translateY(-4px);
  border-color: rgba(201,168,76,0.45);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}

.community-icon {
  width: 72px;
  height: 72px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  transition: transform 0.2s;
}

.community-card:hover .community-icon { transform: scale(1.06); }

.community-icon svg { width: 40px; height: 40px; }

.community-icon-discord   { background: #5865F2; }
.community-icon-youtube   { background: #FF0000; }
.community-icon-instagram { background: linear-gradient(135deg, #FEDA77 0%, #F58529 25%, #DD2A7B 50%, #8134AF 75%, #515BD4 100%); }

.community-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-strong);
  margin-bottom: 4px;
}

.community-card-desc {
  font-size: 12.5px;
  color: var(--text-muted);
  line-height: 1.55;
  word-break: break-all;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--navy-card); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 64px; }

  .lang-item span.lang-name { display: none; }
  .sidebar-header h2, .sidebar-logo, .lang-section-title { display: none; }
  .lang-item { padding: 10px; justify-content: center; }
  .lang-flag { font-size: 22px; }

  .content { padding: 24px 20px; }
  .contact-grid { grid-template-columns: 1fr; }
  .community-grid { grid-template-columns: 1fr; gap: 14px; }
  .community-card { padding: 24px 16px; flex-direction: row; text-align: left; gap: 16px; }
  .community-icon { margin-bottom: 0; width: 56px; height: 56px; flex-shrink: 0; }
  .community-icon svg { width: 32px; height: 32px; }
  .topnav { padding: 0 12px; }
  .nav-tab { padding: 16px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2>Language</h2>
    <div class="sidebar-logo" data-i18n="brand">🌊 아쿠아서바이벌</div>
  </div>
  <div class="lang-section">
    <div class="lang-section-title">Select Language</div>

<!-- ── MAIN ── -->
<div class="main">

  <div class="content">

      <div class="page-title" data-i18n="notice_title"></div>
      <div class="page-subtitle" data-i18n="notice_subtitle"></div>

      <div class="notice-list">

      <div class="page-title" data-i18n="community_title"></div>
      <div class="page-subtitle" data-i18n="community_subtitle"></div>

      <div class="community-grid">
        <a class="community-card" href="https://discord.gg/h3Y4SXKcHM" target="_blank" rel="noopener noreferrer">

/* ─── STATE ─── */
var currentLang = 'ph';
var currentPage = 'support';

/* ─── APPLY LANGUAGE ─── */
function applyLang(lang) {
  var data = i18n[lang] || i18n['en'];
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (data[key] !== undefined) el.textContent = data[key];
  });
}

/* ─── SET LANG ─── */
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-item').forEach(function(el) {
    el.classList.remove('active');
  });
  document.querySelectorAll('.lang-item').forEach(function(el) {
    if (el.getAttribute('onclick') === "setLang('" + lang + "')") {
      el.classList.add('active');
    }
  });
  applyLang(lang);
}

/* ─── SWITCH PAGE ─── */
function switchPage(page, btn) {
  currentPage = page;
  document.querySelectorAll('.page-section').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(function(el) { el.classList.remove('active'); });
  btn.classList.add('active');
  history.replaceState(null, '', '#' + page);
}

/* ─── HASH → PAGE 매핑 ─── */
var pageTabIndex = { notice: 1, community: 2, support: 3, terms: 4, privacy: 5 };

function goToPage(page) {
  var validPages = ['notice', 'community', 'support', 'terms', 'privacy'];
  if (validPages.indexOf(page) === -1) page = 'privacy';
  var idx = pageTabIndex[page];
  var btn = document.querySelector('.nav-tab:nth-child(' + idx + ')');
  switchPage(page, btn);
}

/* ─── FAQ TOGGLE ─── */
function toggleFaq(el) {
  var item = el.parentElement;
  item.classList.toggle('open');
}

/* ─── NOTICE TOGGLE ─── */
function toggleNotice(item) {
  item.classList.toggle('open');
}

/* ─── INIT ─── */
window.onload = function() {
  applyLang('ph');
  var hash = window.location.hash.replace('#', '');
  goToPage(hash || 'privacy');
};

window.addEventListener('hashchange', function() {
  var hash = window.location.hash.replace('#', '');
  goToPage(hash || 'privacy');
});
</script>
